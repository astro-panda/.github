name: Bug
description: A bug is an issue that describes a problem with the software. It should include steps to reproduce the issue, expected behavior, and actual behavior.
labels: bug
type: Bug
body:
  - type: input
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Please provide a step-by-step description of how to reproduce the issue.
    validations:
      required: true
  - type: input
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: Please describe what you expected to happen.
    validations:
      required: true
  - type: input
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: Please describe what actually happened.
    validations:
      required: true
  - type: textarea
    id: additional-information
    attributes:
      label: Additional Information
      description: Please provide any additional information that may be helpful in diagnosing the issue. This can include screenshots, logs, or any other relevant details.
  